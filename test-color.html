<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>德州扑克 - 花色颜色测试</title>
  <style>
    body {
      background: linear-gradient(135deg, #2c1810 0%, #1a0f0a 100%);
      padding: 40px;
      font-family: Georgia, serif;
    }
    
    .test-section {
      background: rgba(255,255,255,0.1);
      padding: 30px;
      border-radius: 20px;
      margin-bottom: 30px;
    }
    
    h2 {
      color: #ffd700;
      margin-bottom: 20px;
    }
    
    /* 卡牌样式 */
    .card {
      display: inline-block;
      width: 80px;
      height: 120px;
      background: linear-gradient(135deg, #f5f5dc 0%, #e8e4c9 100%);
      border-radius: 10px;
      margin: 10px;
      text-align: center;
      line-height: 120px;
      font-size: 40px;
      font-weight: bold;
      box-shadow: 0 6px 20px rgba(0,0,0,0.5);
    }
    
    /* 花色类名 */
    .hearts { }
    .diamonds { }
    .spades { }
    .clubs { }
    
    /* 颜色类 - 最高优先级 */
    .suit-red {
      color: red !important;
    }
    .suit-red .card-rank {
      color: red !important;
    }
    .card.hearts {
      color: red !important;
    }
    .card.hearts .card-rank {
      color: red !important;
    }
    .card.diamonds {
      color: red !important;
    }
    .card.diamonds .card-rank {
      color: red !important;
    }
    .card-rank.hearts {
      color: red !important;
    }
    .card-rank.diamonds {
      color: red !important;
    }
    text.hearts,
    text.diamonds,
    .card-rank.suit-red {
      color: red !important;
    }
    
    .suit-black {
      color: black !important;
    }
    .suit-black .card-rank {
      color: black !important;
    }
    .card.spades {
      color: black !important;
    }
    .card.spades .card-rank {
      color: black !important;
    }
    .card.clubs {
      color: black !important;
    }
    .card.clubs .card-rank {
      color: black !important;
    }
    .card-rank.spades {
      color: black !important;
    }
    .card-rank.clubs {
      color: black !important;
    }
    text.spades,
    text.clubs,
    .card-rank.suit-black {
      color: black !important;
    }
    
    .card-rank {
      display: inline-block;
    }
    
    .result {
      margin-top: 10px;
      padding: 10px;
      border-radius: 10px;
      font-size: 14px;
    }
    
    .success {
      background: rgba(39, 174, 96, 0.3);
      color: #2ecc71;
    }
    
    .error {
      background: rgba(231, 76, 60, 0.3);
      color: #e74c3c;
    }
  </style>
</head>
<body>
  <h1 style="color: #ffd700; text-align: center; margin-bottom: 40px;">🎴 花色颜色测试</h1>
  
  <div class="test-section">
    <h2>测试 1: 红桃 ♥ (应该显示红色)</h2>
    <div class="card hearts suit-red">
      <span class="card-rank suit-red">A♥</span>
    </div>
    <div id="test1-result" class="result"></div>
  </div>
  
  <div class="test-section">
    <h2>测试 2: 方块 ♦ (应该显示红色)</h2>
    <div class="card diamonds suit-red">
      <span class="card-rank suit-red">K♦</span>
    </div>
    <div id="test2-result" class="result"></div>
  </div>
  
  <div class="test-section">
    <h2>测试 3: 黑桃 ♠ (应该显示黑色)</h2>
    <div class="card spades suit-black">
      <span class="card-rank suit-black">Q♠</span>
    </div>
    <div id="test3-result" class="result"></div>
  </div>
  
  <div class="test-section">
    <h2>测试 4: 梅花 ♣ (应该显示黑色)</h2>
    <div class="card clubs suit-black">
      <span class="card-rank suit-black">J♣</span>
    </div>
    <div id="test4-result" class="result"></div>
  </div>
  
  <div class="test-section">
    <h2>测试 5: 完整手牌模拟</h2>
    <div class="card hearts suit-red"><span class="card-rank suit-red">10♥</span></div>
    <div class="card diamonds suit-red"><span class="card-rank suit-red">9♦</span></div>
    <div class="card spades suit-black"><span class="card-rank suit-black">8♠</span></div>
    <div class="card clubs suit-black"><span class="card-rank suit-black">7♣</span></div>
    <div id="test5-result" class="result"></div>
  </div>
  
  <script>
    function checkColor(element, expectedColor, testName) {
      const style = window.getComputedStyle(element);
      const color = style.color;
      
      let expectedRgb;
      if (expectedColor === 'red') {
        expectedRgb = 'rgb(255, 0, 0)';
      } else {
        expectedRgb = 'rgb(0, 0, 0)';
      }
      
      const passed = color === expectedRgb;
      const resultDiv = document.getElementById(testName + '-result');
      
      if (passed) {
        resultDiv.className = 'result success';
        resultDiv.innerHTML = '✅ ' + testName + ' - 颜色正确 (' + color + ')';
      } else {
        resultDiv.className = 'result error';
        resultDiv.innerHTML = '❌ ' + testName + ' - 颜色错误<br>期望：' + expectedRgb + '<br>实际：' + color;
      }
      
      return passed;
    }
    
    // 运行所有测试
    window.onload = function() {
      const results = [];
      
      results.push(checkColor(document.querySelector('#test1-result').previousElementSibling.querySelector('.card-rank'), 'red', 'test1'));
      results.push(checkColor(document.querySelector('#test2-result').previousElementSibling.querySelector('.card-rank'), 'red', 'test2'));
      results.push(checkColor(document.querySelector('#test3-result').previousElementSibling.querySelector('.card-rank'), 'black', 'test3'));
      results.push(checkColor(document.querySelector('#test4-result').previousElementSibling.querySelector('.card-rank'), 'black', 'test4'));
      
      const allPassed = results.every(r => r);
      const test5Result = document.getElementById('test5-result');
      
      if (allPassed) {
        test5Result.className = 'result success';
        test5Result.innerHTML = '✅ 所有测试通过！花色颜色完全正确！';
      } else {
        test5Result.className = 'result error';
        test5Result.innerHTML = '❌ 有测试失败，请检查 CSS';
      }
      
      console.log('测试结果:', results);
    };
  </script>
</body>
</html>
