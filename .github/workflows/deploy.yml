name: Deploy to WeChat Mini Program

on:
  push:
    branches: [ master, main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        
    - name: Install WeChat CLI
      run: npm install -g miniprogram-ci@latest
      
    - name: Prepare private key
      run: |
        mkdir -p ~/.wechat-miniprogram
        # 尝试多种方式写入私钥
        if [ -n "${{ secrets.WECHAT_PRIVATE_KEY }}" ]; then
          echo "${{ secrets.WECHAT_PRIVATE_KEY }}" > ~/.wechat-miniprogram/private.key
        else
          echo "Warning: WECHAT_PRIVATE_KEY is empty"
        fi
        chmod 600 ~/.wechat-miniprogram/private.key
        ls -la ~/.wechat-miniprogram/
        
    - name: Get version from project.config.json
      id: version
      run: |
        VERSION=$(grep -o '"version": "[^"]*"' project.config.json | cut -d'"' -f4)
        if [ -z "$VERSION" ]; then
          VERSION="1.0.0"
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        echo "📦 Version: $VERSION"
        
    - name: Upload to WeChat
      run: |
        cd ${{ github.workspace }}
        
        echo " Checking private key..."
        if [ -f ~/.wechat-miniprogram/private.key ]; then
          echo "✅ Private key exists"
          head -1 ~/.wechat-miniprogram/private.key
        else
          echo "❌ Private key not found"
          exit 1
        fi
        
        echo "📤 Uploading to WeChat..."
        # 使用微信 CLI 上传
        npx miniprogram-ci upload \
          --appid "${{ secrets.WECHAT_APPID }}" \
          --project-path . \
          --private-key-path ~/.wechat-miniprogram/private.key \
          --upload-version "${{ steps.version.outputs.version }}" \
          --upload-description "自动部署：${{ github.event.head_commit.message }}" \
          --verbose || {
            echo "❌ Upload failed, check the logs above"
            exit 1
          }
          
    - name: Upload result
      run: |
        echo "✅ 部署完成！"
        echo "📦 版本：${{ steps.version.outputs.version }}"
        echo "📝 提交：${{ github.event.head_commit.message }}"
        echo "🔗 Actions: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
