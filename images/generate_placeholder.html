<!DOCTYPE html>
<html>
<head>
  <title>生成占位图片</title>
</head>
<body>
  <canvas id="canvas1" width="300" height="300"></canvas>
  <canvas id="canvas2" width="300" height="300"></canvas>
  <canvas id="canvas3" width="300" height="300"></canvas>
  
  <script>
    function createDealer(color, name) {
      const canvas = document.getElementById(color === '#FF69B4' ? 'canvas1' : color === '#2C3E50' ? 'canvas2' : 'canvas3');
      const ctx = canvas.getContext('2d');
      
      // 背景渐变
      const gradient = ctx.createLinearGradient(0, 0, 0, 300);
      gradient.addColorStop(0, color);
      gradient.addColorStop(1, '#1a1a2e');
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, 300, 300);
      
      // 圆形边框
      ctx.beginPath();
      ctx.arc(150, 150, 140, 0, Math.PI * 2);
      ctx.fillStyle = '#fff';
      ctx.fill();
      ctx.strokeStyle = '#ffd700';
      ctx.lineWidth = 8;
      ctx.stroke();
      
      // 文字
      ctx.fillStyle = color;
      ctx.font = 'bold 80px Arial';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(name, 150, 150);
      
      // 装饰
      ctx.font = '40px Arial';
      ctx.fillStyle = '#ffd700';
      ctx.fillText('🎰', 150, 230);
    }
    
    createDealer('#FF69B4', '👩');
    createDealer('#2C3E50', '👩‍');
    createDealer('#8E44AD', '👩‍');
    
    // 自动下载
    setTimeout(() => {
      download('canvas1', 'dealer1.png');
      download('canvas2', 'dealer2.png');
      download('canvas3', 'dealer3.png');
    }, 1000);
    
    function download(canvasId, filename) {
      const canvas = document.getElementById(canvasId);
      const link = document.createElement('a');
      link.download = filename;
      link.href = canvas.toDataURL('image/png');
      link.click();
    }
  </script>
</body>
</html>
